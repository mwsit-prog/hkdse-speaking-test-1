<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Speaking Past Papers Archive (2013-2025)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        /* Smooth transition for the expanding cards */
        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .expanded .card-content {
            max-height: 600px; /* arbitrary max-height for animation */
            opacity: 1;
            padding-top: 1rem;
        }
        .chevron {
            transition: transform 0.3s ease;
        }
        .expanded .chevron {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-blue-700 text-white py-8 shadow-md">
        <div class="max-w-6xl mx-auto px-4">
            <h1 class="text-3xl font-bold mb-2">HKDSE Speaking Past Papers (2013-2025)</h1>
            <p class="text-blue-100">Browse, search, and study past Paper 4 speaking topics.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-8">
            <div class="mb-6">
                <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-2">Search Keywords</label>
                <input type="text" id="searchInput" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" 
                    placeholder="Search by topic, keyword, or key points...">
            </div>

            <div>
                <span class="block text-sm font-medium text-gray-700 mb-2">Filter by Category</span>
                <div id="categoryContainer" class="flex flex-wrap gap-2">
                    </div>
            </div>
        </div>

        <div class="mb-4 text-gray-600 font-medium" id="resultsCount">Loading papers...</div>

        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

    </main>

    <script>
        // Use the exact file name of your uploaded CSV
        const CSV_FILE_URL = 'HKDSE English Paper 4 Speaking Past Papers (2013-2025) - Table 1.csv';
        
        let allPapers = [];
        let activeCategory = 'All';

        // 1. Fetch and Parse the CSV Data
        Papa.parse(CSV_FILE_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allPapers = results.data;
                initializeCategories();
                renderCards(allPapers);
            },
            error: function(err) {
                document.getElementById('cardsContainer').innerHTML = 
                    `<p class="text-red-500">Error loading data. Make sure the CSV file is in the same folder and the file name matches exactly.</p>`;
            }
        });

        // 2. Extract Categories and Create Filter Buttons
        function initializeCategories() {
            const categorySet = new Set();
            
            allPapers.forEach(paper => {
                if(paper['Main Category']) {
                    // Split categories if they have slashes (e.g. "Sports / School Life")
                    const cats = paper['Main Category'].split('/').map(c => c.trim());
                    cats.forEach(c => categorySet.add(c));
                }
            });

            const categories = Array.from(categorySet).sort();
            categories.unshift('All'); // Add default 'All' option

            const container = document.getElementById('categoryContainer');
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat}')" 
                    class="category-btn px-4 py-1.5 rounded-full text-sm font-medium transition-colors 
                    ${cat === 'All' ? 'bg-blue-700 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">
                    ${cat}
                </button>
            `).join('');
        }

        // 3. Handle Category Click
        function setCategory(category) {
            activeCategory = category;
            
            // Update button styles
            document.querySelectorAll('.category-btn').forEach(btn => {
                if (btn.innerText === category) {
                    btn.classList.replace('bg-gray-100', 'bg-blue-700');
                    btn.classList.replace('text-gray-600', 'text-white');
                    btn.classList.remove('hover:bg-gray-200');
                } else {
                    btn.classList.replace('bg-blue-700', 'bg-gray-100');
                    btn.classList.replace('text-white', 'text-gray-600');
                    btn.classList.add('hover:bg-gray-200');
                }
            });

            applyFilters();
        }

        // 4. Handle Search Input
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // 5. Apply Search & Category Filters together
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allPapers.filter(paper => {
                // Check Category
                const matchesCategory = activeCategory === 'All' || 
                                        (paper['Main Category'] && paper['Main Category'].includes(activeCategory));
                
                // Check Search Term (Search across Specific Topic, Question, and Suggested Vocabulary)
                const searchString = `
                    ${paper['Specific Topic'] || ''} 
                    ${paper['Core Discussion Question'] || ''} 
                    ${paper['Suggested Vocabulary or Key Points'] || ''}
                `.toLowerCase();
                const matchesSearch = searchString.includes(searchTerm);

                return matchesCategory && matchesSearch;
            });

            renderCards(filtered);
        }

        // 6. Render the Cards to the DOM
        function renderCards(papers) {
            const container = document.getElementById('cardsContainer');
            document.getElementById('resultsCount').innerText = `Showing ${papers.length} past paper sets`;

            container.innerHTML = papers.map((paper, index) => `
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition-shadow cursor-pointer p-5 flex flex-col h-full" 
                     onclick="this.classList.toggle('expanded')">
                    
                    <div class="flex justify-between items-start mb-3">
                        <span class="inline-block px-2 py-1 bg-blue-100 text-blue-800 text-xs font-semibold rounded">
                            ${paper['Year']} | Set ${paper['Set Number']}
                        </span>
                        <svg class="chevron w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                    
                    <h2 class="text-lg font-bold text-gray-800 mb-1 leading-tight">${paper['Specific Topic']}</h2>
                    <p class="text-sm text-gray-500 mb-2">${paper['Main Category']}</p>
                    
                    <div class="card-content mt-auto border-t border-gray-100 text-sm">
                        <div class="mb-3">
                            <strong class="text-gray-900 block mb-1">Core Discussion Question:</strong>
                            <p class="text-gray-700 italic border-l-4 border-blue-400 pl-3 py-1 bg-gray-50">
                                "${paper['Core Discussion Question']}"
                            </p>
                        </div>
                        <div>
                            <strong class="text-gray-900 block mb-1">Suggested Vocabulary / Key Points:</strong>
                            <p class="text-gray-600">${paper['Suggested Vocabulary or Key Points']}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
